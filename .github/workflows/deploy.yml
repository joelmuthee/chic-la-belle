name: Deploy Chic La Belle

# Reliable auto-deploy via wrangler (CF Pages' native git integration silently
# dies after hours/days — see CATALOG-STANDARDS "Catalog hosting"). Needs ONE
# repo secret: CLOUDFLARE_API_TOKEN (account-scoped, reusable across all catalogs:
# Cloudflare Pages: Edit + Workers Scripts: Edit + Workers KV Storage: Edit on the
# Stawisystems account). Paste it with NO trailing newline or wrangler fails with
# an invalid-header error. CLOUDFLARE_ACCOUNT_ID is hard-coded below, not a secret.

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 58685495706b973821d77208248c66fc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Static site → Cloudflare Pages (production branch = main)
      - name: Deploy Pages
        run: npx wrangler@4 pages deploy . --project-name=chic-la-belle --branch=main --commit-dirty=true

      # API worker
      - name: Deploy Worker
        working-directory: worker
        run: npx wrangler@4 deploy
